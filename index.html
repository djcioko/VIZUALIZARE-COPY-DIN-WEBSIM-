<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Visualizer OBS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="ui">
        <div class="controls">
            <input type="file" id="file-input" multiple accept="audio/*,video/*">
            <button id="playpause">Play</button>
            <button id="stop">Stop</button>
            <select id="audio-device"><option value="">Microfon...</option></select>
            <button id="mic-listen">🎤 Listen Mic</button>
        </div>
        <ul id="clip-list"></ul>
    </div>
    <canvas id="canvas"></canvas>
    <script type="module" src="app.js"></script>
</body>
</html>
